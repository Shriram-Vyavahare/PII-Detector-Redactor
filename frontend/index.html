<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PII Detector & Redactor</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🔐 PII Detector & Redactor</h1>

<p class="subtitle">
Upload a document to detect and redact sensitive information
</p>


<!-- Upload Section -->

<div class="upload-box" id="uploadBox">

<input type="file" id="fileInput" hidden>

<p id="uploadText">Drag & Drop your file here</p>

<button id="browseBtn">Browse File</button>

<p class="formats">Supported formats: PDF, DOCX</p>

</div>


<!-- Process Button -->

<button id="processBtn" disabled>Detect & Redact</button>


<!-- Loader -->

<div id="loader" class="loader hidden"></div>


<!-- Results -->

<div id="results" class="results hidden">

<h2>Detected PII</h2>

<div id="piiList"></div>

<!-- Download Buttons Row -->
<div class="download-row">
  <button id="downloadBtn" disabled>⬇ Download Redacted File</button>
  <button id="reportBtn"   disabled>📄 Download Report</button>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
